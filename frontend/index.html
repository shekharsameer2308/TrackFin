<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackFin - Smart Personal Finance</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar glass-panel">
            <div class="logo">
                <div class="logo-icon"></div>
                <h2>TrackFin</h2>
            </div>
            <nav>
                <a href="#" class="nav-item active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    Dashboard
                </a>
                <a href="#" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
                    Analytics
                </a>
                <a href="#" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1h.09a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    Settings
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="content">
            <header class="header glass-panel">
                <div class="greeting">
                    <h1>Overview</h1>
                    <p>Welcome back! Here's your financial summary.</p>
                </div>
                <button class="btn-primary" onclick="openModal()">+ Add Transaction</button>
            </header>

            <div class="dashboard-grid">
                <!-- Summary Cards -->
                <div class="summary-cards">
                    <div class="card glass-panel highlight-card">
                        <h3>Total Balance</h3>
                        <div class="amount" id="net-amount">$0.00</div>
                    </div>
                    <div class="card glass-panel">
                        <h3>Income</h3>
                        <div class="amount text-success" id="income-amount">+$0.00</div>
                    </div>
                    <div class="card glass-panel">
                        <h3>Expenses</h3>
                        <div class="amount text-danger" id="expense-amount">-$0.00</div>
                    </div>
                </div>

                <!-- Charts Area -->
                <div class="charts-area">
                    <div class="chart-card glass-panel">
                        <h3>Expense Breakdown</h3>
                        <div class="chart-container">
                            <canvas id="expenseChart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Recent Transactions -->
                <div class="transactions-area glass-panel">
                    <div class="section-header">
                        <h3>Recent Transactions</h3>
                        <button class="btn-text">View All</button>
                    </div>
                    <div class="transaction-list" id="transaction-list">
                        <!-- Transaction items will be injected here -->
                        <div class="loading">Loading transactions...</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Transaction Modal -->
    <div class="modal-overlay" id="add-modal">
        <div class="modal glass-panel">
            <div class="modal-header">
                <h2>New Transaction</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="transaction-form">
                <div class="form-group">
                    <label>Type</label>
                    <div class="toggle-switch">
                        <input type="radio" id="type-expense" name="type" value="expense" checked>
                        <label for="type-expense">Expense</label>
                        <input type="radio" id="type-income" name="type" value="income">
                        <label for="type-income">Income</label>
                        <div class="toggle-slider"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="amount">Amount</label>
                    <div class="input-prefix">
                        <span>$</span>
                        <input type="number" id="amount" name="amount" step="0.01" required placeholder="0.00">
                    </div>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" required>
                        <option value="Food">Food & Dining</option>
                        <option value="Transport">Transportation</option>
                        <option value="Housing">Housing & Utilities</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Salary">Salary</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date" required>
                </div>
                <div class="form-group">
                    <label for="notes">Notes (Optional)</label>
                    <input type="text" id="notes" name="notes" placeholder="What was this for?">
                </div>
                <button type="submit" class="btn-primary w-full">Save Transaction</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
